name: Release CocoQR BE

on:
  push:
    tags:
      - "v*.*.*"
      - "v*.*.*-rc*"

concurrency:
  group: release-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    outputs:
      version: ${{ steps.vars.outputs.version }}

    steps:
      - uses: actions/checkout@v4

      - name: Extract version
        id: vars
        run: echo "version=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Login Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build image
        run: |
          docker build \
            -t ${{ secrets.DOCKER_USERNAME }}/mywallet-be:${{ steps.vars.outputs.version }} \
            .

      - name: Push image
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/mywallet-be:${{ steps.vars.outputs.version }}

  deploy-staging:
    if: contains(github.ref_name, '-rc')
    needs: build
    runs-on: ubuntu-latest
    environment: STAGING

    steps:
      - name: Deploy to Staging via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            docker login -u ${{ secrets.DOCKER_USERNAME }} -p ${{ secrets.DOCKER_PASSWORD }}
            docker pull ${{ secrets.DOCKER_USERNAME }}/mywallet-be:${{ needs.build.outputs.version }}
            cd /opt/mywallet-be-staging
            export IMAGE_TAG=${{ needs.build.outputs.version }}
            docker compose --profile migrate run --rm migrator || exit 1
            docker compose up -d mywallet-be-staging
            docker image prune -f

  deploy-production:
    if: "!contains(github.ref_name, '-rc')"
    needs: [build]
    runs-on: ubuntu-latest
    environment: PRODUCTION

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check if RC exists
        run: |
          set -euo pipefail

          VERSION=${{ needs.build.outputs.version }}
          RC_TAGS=$(git tag -l "${VERSION}-rc*")

          if [ -z "$RC_TAGS" ]; then
            echo "❌ No RC tag found for ${VERSION}"
            exit 1
          fi

          echo "✅ Found RC tags:"
          echo "$RC_TAGS"

      - name: Deploy to Production via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            docker login -u ${{ secrets.DOCKER_USERNAME }} -p ${{ secrets.DOCKER_PASSWORD }}
            docker pull ${{ secrets.DOCKER_USERNAME }}/mywallet-be:${{ needs.build.outputs.version }}
            cd /opt/mywallet-be-production
            export IMAGE_TAG=${{ needs.build.outputs.version }}
            docker compose --profile migrate run --rm migrator || exit 1
            docker compose up -d mywallet-be-production
            docker image prune -a -f
